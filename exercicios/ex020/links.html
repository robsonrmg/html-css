<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando Links</title>
    <style>
        /*
        
        #    = id
        .    = class
        :    = pseudo-classe
        ::   = pseudo-elemento 
        >    = filho direto ou clildren
        
        */
        body {
            font-family: Arial, sans-serif;
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: darkred;
        }
        a:hover {
            color: rgb(3, 6, 218);
            text-decoration: underline;
        }
            a:active {
                color: rgb(255, 251, 4);
         }
         .especial {
            background-color: limegreen;
         }
           .especial::before {
            content: "⇒";

           }
          
         .especial::after {
                content: "⇐";
                text-decoration: none;
                font-weight: normal;
                color: darkgrey
                
            }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com" class="especial">Repositório do GitHub</a></li>
        <li> <a href="https://www.youtube.com" class="especial">Canal do YouTube</a></li>
        <li> <a href="https://www.cursoemvideo.com" class="especial">Site do cursoemvideo</a></li>
    </ul>
</body>
</html>
