<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Love Larry';
            src: url(fonts/love\ larry\ ttf.ttf) format(truetype);
           font-weight: normal;
           font-style: normal;
           @font-face {
            font-family: 'Love.ttf';
            src: url(fonts/Love.ttf) format(truetype), url(fonts/Love.ttf) format(opentype);
            font: optional;
            font-weight: normal;
            font-style: normal;
           }

            /* tipos de format
            -opentype: .otf
            -truetype: .ttf
            -embedded opentype: .eot
            truetype collections: .ttc
            web open font format: .woff
            svg: .svg
             */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;

        }
        h1 {
            font-family: 'Love Larry', Times, serif;
            font-size: 3em;
            font-weight: normal;
            color: rgb(65, 12, 12);
            
            }
        
            </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Earum maxime nam sequi amet illum, ipsa, esse dolore modi quos officia itaque consectetur ab veniam nesciunt dolores ipsum magnam quidem ea?</p>
</body>
</html>
