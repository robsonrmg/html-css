<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        html, body { /* Configurações globais das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to right, #032CA6, #1b3b9b,#034AA6,#034AA6 8%,#0487D9, #079DD9 );
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente em CSS</h1>
</body>
</html>
