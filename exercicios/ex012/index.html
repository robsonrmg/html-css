<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vdeos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado localmente no meu computador.</p>
    <video width="500" poster="imagens/imagem-funil.png" controls autoplay loop>
        <source src="midia/meu-video.mp4" type="video/mp4">
        <source src="midia/Meu-Video720.mp4" type="video/mp4">
        <source src="midia/Meu-Video(1).webm" type="video/webm">
        <p>Seu navegador não suporta o elemento de vídeo.</p>
    </video>
<h1>Inserindo videos do youtub</h1>
inframe o link do video do youtube, e ele sera inserido automaticamente
    <iframe width="560" height="315" src="https://www.youtube.com/embed/fsBKCz8zpvQ?si=Mnc9bX0aY9T1q34v" title="YouTube video player" frameborder="500" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

       
</body>
</html>
