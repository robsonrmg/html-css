<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente redimensionar o navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Responsive image demonstrating dynamic media display across different device sizes and screen resolutions">
    </picture>
    <h1>Vamos aprender a reproduzir audio em Html5</h1>
    <audio preload="metadata" controls autoplay loop>
        <source src="midia/record-audio.mp3" type="audio/mpeg">
        <source src="midia/record-audio.ogg" type="audio/ogg">
        <source src="midia/record-audio.wav" type="audio/wav">
        Seu navegador não suporta o elemento de áudio.
    </audio>
    
    <!--compativel MP3 WAV OGG-->
</html>
